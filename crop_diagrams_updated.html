<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2015 전기기능사 그림 자동 크롭</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
  h1 { color: #e94560; }
  button { padding: 12px 24px; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px 0; }
  button:hover { background: #c73652; }
  #log { background: #16213e; padding: 16px; border-radius: 8px; margin-top: 20px; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 13px; }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .info { color: #60a5fa; }
  #previews { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px; }
  .preview-box { background: #16213e; padding: 10px; border-radius: 8px; text-align: center; }
  .preview-box img { max-width: 300px; border: 1px solid #333; border-radius: 4px; }
  .preview-box p { margin: 6px 0 0; font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<h1>📐 2015 전기기능사 그림 자동 크롭</h1>
<p>PDF에서 [그림 참고] 문항의 도표를 자동으로 추출합니다.</p>
<button id="startBtn" onclick="start()">▶ 크롭 시작</button>
<div id="log"></div>
<div id="previews"></div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'http://localhost:3000/ElectricExam2015.pdf';
  const SCALE = 3.0; // 300% for high resolution

  // 각 그림 문항 정의: [page(1-based), id, x, y, w, h] (PDF 좌표계 기준, 단위: pt)
  // PDF 페이지 크기가 약 595x842pt 기준
  const DIAGRAMS = [
  {
    "id": "2015_01_4",
    "page": 1,
    "x": 560,
    "y": 490,
    "w": 190,
    "h": 100,
    "label": "delta-connected 3-phase circuit"
  },
  {
    "id": "2015_01_7",
    "page": 2,
    "x": 200,
    "y": 500,
    "w": 190,
    "h": 100,
    "label": "capacitors in series and parallel"
  },
  {
    "id": "2015_01_17",
    "page": 3,
    "x": 560,
    "y": 500,
    "w": 190,
    "h": 100,
    "label": "parallel RLC circuit"
  },
  {
    "id": "2015_01_18",
    "page": 4,
    "x": 200,
    "y": 500,
    "w": 190,
    "h": 100,
    "label": "circuit with resistors and a voltage source"
  },
  {
    "id": "2015_04_11",
    "page": 21,
    "x": 440,
    "y": 400,
    "w": 190,
    "h": 100,
    "label": "parallel RL circuit"
  },
  {
    "id": "2015_04_13",
    "page": 21,
    "x": 440,
    "y": 200,
    "w": 190,
    "h": 100,
    "label": "resistor network"
  },
  {
    "id": "2015_04_20",
    "page": 23,
    "x": 200,
    "y": 400,
    "w": 190,
    "h": 100,
    "label": "resistor network (Wheatstone bridge)"
  },
  {
    "id": "2015_04_22",
    "page": 23,
    "x": 560,
    "y": 400,
    "w": 190,
    "h": 100,
    "label": "phase control circuit with a DIAC and TRIAC"
  },
  {
    "id": "2015_04_30",
    "page": 24,
    "x": 440,
    "y": 400,
    "w": 190,
    "h": 100,
    "label": "DC motor with poles and windings"
  },
  {
    "id": "2015_04_31",
    "page": 24,
    "x": 440,
    "y": 200,
    "w": 190,
    "h": 100,
    "label": "split-phase induction motor"
  },
  {
    "id": "2015_04_32",
    "page": 25,
    "x": 200,
    "y": 400,
    "w": 190,
    "h": 100,
    "label": "single-phase transformer connection (Y-Y, Delta-Y, etc.)"
  },
  {
    "id": "2015_04_33",
    "page": 25,
    "x": 200,
    "y": 200,
    "w": 190,
    "h": 100,
    "label": "DC motor (shunt motor)"
  },
  {
    "id": "2015_05_31",
    "page": 33,
    "x": 200,
    "y": 200,
    "w": 190,
    "h": 100,
    "label": "DC generator (compound generator)"
  },
  {
    "id": "2016_02_10",
    "page": 11,
    "x": 508,
    "y": 105,
    "w": 70,
    "h": 27,
    "label": "circuit diagram"
  },
  {
    "id": "2016_02_15",
    "page": 13,

    "y": 105,
    "w": 70,
    "h": 27,
    "label": "circuit diagram"
  },
  {
    "id": "2015_01_6",
    "page": 4,
    "x": 320,
    "y": 555,
    "w": 250,
    "h": 120,
    "label": "1회 Q6: 콘덴서 합성"
  },
  {
    "id": "2015_01_14",
    "page": 5,
    "x": 320,
    "y": 660,
    "w": 250,
    "h": 130,
    "label": "1회 Q14: 병렬 공진"
  },
  {
    "id": "2015_01_15",
    "page": 5,
    "x": 320,
    "y": 480,
    "w": 250,
    "h": 130,
    "label": "1회 Q15: 노튼 등가"
  }
];

  function log(msg, type='info') {
    const div = document.getElementById('log');
    const line = document.createElement('div');
    line.className = type;
    line.textContent = msg;
    div.appendChild(line);
    div.scrollTop = div.scrollHeight;
  }

  function addPreview(id, dataUrl, label) {
    const previews = document.getElementById('previews');
    const box = document.createElement('div');
    box.className = 'preview-box';
    box.innerHTML = `<img src="${dataUrl}"><p>${label}<br><small>${id}</small></p>`;
    previews.appendChild(box);
  }

  async function cropPage(pdf, diagram) {
    const { id, page, x, y, w, h, label } = diagram;
    const pdfPage = await pdf.getPage(page);
    const viewport = pdfPage.getViewport({ scale: SCALE });

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');

    await pdfPage.render({ canvasContext: ctx, viewport }).promise;

    // PDF 좌표계 → 캔버스 좌표 변환 (PDF 좌표는 아래→위, 캔버스는 위→아래)
    const pageHeight = pdfPage.getViewport({ scale: 1 }).height;
    const cx = x * SCALE;
    const cy = (pageHeight - y - h) * SCALE;
    const cw = w * SCALE;
    const ch = h * SCALE;

    const cropCanvas = document.createElement('canvas');
    cropCanvas.width = cw;
    cropCanvas.height = ch;
    const cropCtx = cropCanvas.getContext('2d');
    cropCtx.drawImage(canvas, cx, cy, cw, ch, 0, 0, cw, ch);

    return cropCanvas.toDataURL('image/png');
  }

  function downloadAll(results) {
    results.forEach(({ id, dataUrl }) => {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `${id}_diagram.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  }

  async function start() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('log').innerHTML = '';
    document.getElementById('previews').innerHTML = '';

    log('📄 PDF 로드 중...', 'info');
    let pdf;
    try {
      pdf = await pdfjsLib.getDocument(PDF_URL).promise;
      log(`✅ PDF 로드 완료 (총 ${pdf.numPages} 페이지)`, 'ok');
    } catch(e) {
      log(`❌ PDF 로드 실패: ${e.message}`, 'err');
      document.getElementById('startBtn').disabled = false;
      return;
    }

    const results = [];
    for (const diagram of DIAGRAMS) {
      log(`⏳ 크롭 중... ${diagram.label}`, 'info');
      try {
        const dataUrl = await cropPage(pdf, diagram);
        results.push({ id: diagram.id, dataUrl });
        addPreview(diagram.id, dataUrl, diagram.label);
        log(`✅ ${diagram.id} 완료`, 'ok');
      } catch(e) {
        log(`❌ ${diagram.id} 실패: ${e.message}`, 'err');
      }
    }

    log(`\n💾 ${results.length}개 이미지 다운로드 중...`, 'info');
    downloadAll(results);
    log('🎉 완료! 다운로드 폴더를 확인하세요. 파일을 e:\\DoGiGo\\client\\public\\images\\diagrams\\ 폴더로 이동하세요.', 'ok');
    document.getElementById('startBtn').disabled = false;
  }
</script>
</body>
</html>
